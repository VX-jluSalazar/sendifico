              schema: { $ref: '#/components/schemas/ApiError' }
              examples:
                notPurchasedYet:
                  value: { statusCode: 422, message: shipmentCarrierTokenNotFound }

  /shipment/annulAndRefund/{id}:
    patch:
      operationId: annulAndRefundShipment
      tags: [Shipments]
      summary: Cancel + refund a shipment
      description: |
        Cancel a shipment and refund any payment. The terminal `shipment.status` depends on how far the shipment got:

        - **Unpaid shipment** → `annulled` (nothing charged, no refund).
        - **Paid shipment, before label generated** → `refunded` (instant wallet refund).
        - **Paid shipment, after label generated** → `refunded` for most carriers; `refundPending` when the carrier needs a manual refund (it completes out-of-band — poll `GET /shipment/{id}` in a day to check the if the pending refund has been processed).

        `annulReasonStatus` is **always required** (omitting it → `400 pApiShipmentAnnulReasonStatusRequired`); `annulReasonDetails` is an optional free-text note.
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - $ref: '#/components/parameters/CountryHeader'
        - $ref: '#/components/parameters/ShipmentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ShipmentAnnulRequest' }
            example:
              annulReasonStatus: incorrectShipmentDetails
              annulReasonDetails: Customer changed their mind
      responses:
        '200':
          description: Shipment annulled (and refunded if it had been paid)
          headers:
            x-sendifico-api-version: { $ref: '#/components/headers/ApiVersionEcho' }
            x-sendifico-country: { $ref: '#/components/headers/CountryEcho' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShipmentDetailEnvelope' }
              example:
                payload:
                  shipmentId: 4001234
                  extId: my-shop-order-9876
                  status: refunded
                  isPaid: true
                  preferredCarrierToken: ec_laar
                  priceSubtotal: 0.88
                  priceTotal: 1.01
                  goodsCurrency: USD
                  goodsCollection: 50.0
                  goodsInsured: 50.0
                  contents: [clothes]
                  senderAddress:
                    addressId: 2001234
                    addressType: sender
                    fullName: Juan Pérez
                    company: Acme S.A.
                    email: juan.perez@example.com
                    streetLine1: Av. 9 de Octubre 1234
                    reference: Edificio Plaza, oficina 201
                    territoryBaseId: 'EC|:|GUAYAS|:|GUAYAQUIL|:|GUAYAQUIL'
                    country: EC
                    zip: '090313'
                    lat: -2.1894
                    lng: -79.8891
                    phone: '+593987654321'
                    objectCreated: '2026-04-12T09:00:00.000Z'
                  recipientAddress:
                    addressId: 2001235
                    addressType: recipient
                    fullName: María García
                    company: null
                    email: maria.garcia@example.com
                    streetLine1: Av. Amazonas N34-451
                    reference: Frente al parque
                    territoryBaseId: 'EC|:|PICHINCHA|:|QUITO|:|QUITO'
                    country: EC
                    zip: '170135'
                    lat: -0.1807
                    lng: -78.4678
                    phone: '+593998877665'
                    objectCreated: '2026-04-12T09:05:00.000Z'
                  trackingNumber: LAAR-EC-987654321
                  trackingCarrierUrl: 'https://tracking.sendifico.com/LAAR-EC-987654321'
                  incidentCount: null
                  objectCreated: '2026-05-09T14:32:00.000Z'
                  objectUpdated: '2026-05-09T16:10:00.000Z'
