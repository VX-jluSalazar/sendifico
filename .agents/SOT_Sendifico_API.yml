  /territory:
    get:
      operationId: listTerritories
      tags: [Territories]
      summary: List standardized territories
      description: |
        List the standardized territories Sendifico supports for the request's country (based on the `x-sendifico-country` header). Use the returned `territoryBaseId` EXACTLY (opaque string) as `senderAddress.territoryBaseId` / `recipientAddress.territoryBaseId`.

        **Not paginated** — one call returns the full list . Fetch once at integration time and cache locally, refreshing periodically (e.g. weekly).

        For Ecuador: `territory1Name` = Provincia, `territory2Name` = Cantón, `territory3Name` = Parroquia. `searchableText` is a ready-made label for autocomplete UIs.
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - $ref: '#/components/parameters/CountryHeader'
      responses:
        '200':
          description: The full territory list for the requested country
          headers:
            x-sendifico-api-version: { $ref: '#/components/headers/ApiVersionEcho' }
            x-sendifico-country: { $ref: '#/components/headers/CountryEcho' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TerritoryListEnvelope' }
              example:
                payload:
                  data:
                    - { territoryBaseId: 'EC|:|AZUAY|:|CUENCA|:|CUENCA', territory1Name: AZUAY, territory2Name: CUENCA, territory3Name: CUENCA, searchableText: Azuay - Cuenca - Cuenca }
                    - { territoryBaseId: 'EC|:|PICHINCHA|:|QUITO|:|QUITO', territory1Name: PICHINCHA, territory2Name: QUITO, territory3Name: QUITO, searchableText: Pichincha - Quito - Quito }
                    - { territoryBaseId: 'EC|:|GUAYAS|:|GUAYAQUIL|:|GUAYAQUIL', territory1Name: GUAYAS, territory2Name: GUAYAQUIL, territory3Name: GUAYAQUIL, searchableText: Guayas - Guayaquil - Guayaquil }
                objectType: territory
        '400':
          $ref: '#/components/responses/RequestValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: x-api-key
      description: Visit https://app.sendifico.com/integrations to create your API key.

  parameters:
    ApiVersionHeader:
      name: x-sendifico-api-version
      in: header
      required: true
      description: Date-stamped API version (`YYYY-MM-DD`). Required on every request.
      schema:
        type: string
        pattern: '^\d{4}-\d{2}-\d{2}$'
        example: '2026-01-01'
    CountryHeader:
      name: x-sendifico-country
      in: header
      required: true
      description: Target market, ISO 3166-1 alpha-2. Required on every request; echoed back.
      schema:
        type: string
        example: EC
    ShipmentIdPath:
      name: id
      in: path
      required: true
      description: The `shipmentId` returned by `POST /shipment`.
      schema:
        type: integer
        format: int64
        example: 4001234
    LimitQuery:
      name: limit
      in: query
      required: false
      description: Page size (default 20, server-enforced max).
      schema:
        type: integer
        default: 20
        example: 20
    PageQuery:
      name: page
      in: query
      required: false
      description: 1-indexed page number.
      schema:
        type: integer
        default: 1
        example: 1

  headers:
    ApiVersionEcho:
      description: Echoes the resolved API version that serialized this response.
      schema: { type: string, example: '2026-01-01' }
    CountryEcho:
      description: Echoes the resolved market country.
      schema: { type: string, example: EC }

  responses:
    RequestValidationError:
      description: >-
        A required header or body field is missing or invalid. Common `message`
        codes: `missingApiVersion`, `invalidApiVersion`, `unknownApiVersion`,
        `pApiCountryMissing`, `pApiCountryUnsupported`,
        `pApiQuotationCurrencyNotFound`, `pApiWalletUnsupportedPaymentMethod`,
        `pApiShipmentPurchaseWithRequired`, `pApiShipmentAnnulReasonStatusRequired`,
        `pApiShipmentLabelDispositionInvalid`.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          examples:
            missingApiVersion:
              value: { statusCode: 400, message: missingApiVersion }
            invalidApiVersion:
              value: { statusCode: 400, message: invalidApiVersion }
            unknownApiVersion:
              value: { statusCode: 400, message: unknownApiVersion }
            countryMissing:
              value: { statusCode: 400, message: pApiCountryMissing }
            countryUnsupported:
              value: { statusCode: 400, message: pApiCountryUnsupported }
            currencyNotSupported:
              value: { statusCode: 400, message: pApiQuotationCurrencyNotFound }
            pApiWalletUnsupportedPaymentMethod:
              value: { statusCode: 400, message: pApiWalletUnsupportedPaymentMethod }
            purchaseWithRequired:
              value: { statusCode: 400, message: pApiShipmentPurchaseWithRequired }
            annulReasonStatusRequired:
              value: { statusCode: 400, message: pApiShipmentAnnulReasonStatusRequired }
            labelDispositionInvalid:
              value: { statusCode: 400, message: pApiShipmentLabelDispositionInvalid }
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example: { statusCode: 401, message: invalidApiKey }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          examples:
            shipmentNotFound:
              value: { statusCode: 404, message: pApiShipmentNotFound }
            rateNotFound:
              value: { statusCode: 404, message: pApiShipmentRateNotFound }
            senderAddressNotFound:
              value: { statusCode: 404, message: pApiAddressSenderNotFound }
            recipientAddressNotFound:
              value: { statusCode: 404, message: pApiAddressRecipientNotFound }
            labelTypeNotFound:
              value: { statusCode: 404, message: pApiShipmentLabelTypeNotFound }
    Conflict:
      description: >-
        The request conflicts with the current state of your account. On
        `POST /shipment` this means the supplied `extId` was already used by an
        earlier shipment for this account — `extId` is unique per merchant order.
        The create is NOT replayed and nothing is overwritten; retry with a fresh
        `extId`, or look the existing shipment up via `GET /shipment`.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example: { statusCode: 409, message: pApiShipmentExtIdAlreadyUsed }
    LabelNotReady:
      description: >-
        The shipment has no downloadable label yet — generate the tracking number
        first with `PATCH /shipment/generateTrackingNumber/{id}`, then retry.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example: { statusCode: 409, message: pApiShipmentLabelNotReady }

  schemas:
    # ── Shared value objects ────────────────────────────────────────────────
    Parcel:
      type: object
      description: Parcel dimensions and weight. `weight` is kg; `length`/`width`/`height` are cm.
      required: [weight, length, width, height]
      properties:
        weight: { type: number, description: Weight in kilograms., example: 1.5 }
        length: { type: number, description: Length in centimeters., example: 30 }
        width: { type: number, description: Width in centimeters., example: 20 }
        height: { type: number, description: Height in centimeters., example: 10 }

    QuoteAddress:
      type: object
      description: >-
        Inline address used only for quoting. Only `territoryBaseId` and
        `country` are used; full delivery details are collected at create time.
      required: [territoryBaseId, country]
      properties:
        territoryBaseId:
          type: string
          description: Opaque territory id from `GET /territory`.
          example: 'EC|:|GUAYAS|:|GUAYAQUIL|:|GUAYAQUIL'
        country: { type: string, example: EC }

    AddressInline:
      type: object
      description: >-
        Inline recipient address on `POST /shipment` (alternative to a saved
        `recipientAddressId`). Persisted as a fresh recipient address row.
      required: [fullName, streetLine1, territoryBaseId, country, phone]
      properties:
        fullName: { type: string, example: María García }
        streetLine1: { type: string, example: Av. Amazonas N24-03 y Colón }
        territoryBaseId:
          type: string
          example: 'EC|:|PICHINCHA|:|QUITO|:|QUITO'
        country: { type: string, example: EC }
        phone: { type: string, description: E.164., example: '+593987654321' }
        company: { type: [string, 'null'], example: Acme S.A. }
        email: { type: [string, 'null'], format: email, example: maria.garcia@example.com }
        reference: { type: [string, 'null'], example: Frente al parque }
        zip: { type: [string, 'null'], example: '170135' }
        lat: { type: [number, 'null'], example: -0.1807 }
        lng: { type: [number, 'null'], example: -78.4678 }

    Address:
      type: object
      description: A saved address as returned by the API.
      properties:
        addressId: { type: integer, format: int64, example: 2001234 }
        addressType: { $ref: '#/components/schemas/AddressType' }
        fullName: { type: string, example: Juan Pérez }
        company: { type: [string, 'null'], example: Acme S.A. }
        email: { type: [string, 'null'], format: email, example: juan.perez@example.com }
        streetLine1: { type: string, example: Av. 9 de Octubre 1234 }
        reference: { type: [string, 'null'], example: Edificio Plaza, oficina 201 }
        territoryBaseId: { type: string, example: 'EC|:|GUAYAS|:|GUAYAQUIL|:|GUAYAQUIL' }
        country: { type: string, example: EC }
        zip: { type: [string, 'null'], example: '090313' }
        lat: { type: [number, 'null'], example: -2.1894 }
        lng: { type: [number, 'null'], example: -79.8891 }
        phone: { type: string, example: '+593987654321' }
        objectCreated: { type: string, format: date-time, example: '2026-04-12T09:00:00.000Z' }

    QuotationRate:
      type: object
      description: One carrier's quote row.
      properties:
        quotationId: { type: integer, format: int64, example: 5001234 }
        carrierToken: { type: string, example: ec_laar }
        priceSubtotal: { type: number, example: 0.88 }
        priceTotal: { type: number, example: 1.01 }
        currency: { type: string, example: USD }
        estimateDays: { type: integer, example: 2 }
        available:
          type: boolean
          description: >-
            Whether this carrier can actually be selected for a shipment with
            these inputs (COD amount, insured value, parcel weight/dimensions,
            recipient territory). A `false` row is still returned so you can show
            the carrier as unavailable with a reason.
          example: true
        unavailableReason:
          type: string
          description: >-
            Machine-readable constraint code, present only when `available` is
            false. Known codes (extensible): `codLimitExceeded`,
            `codNotSupported`, `insuredLimitExceeded`, `insuranceRequired`,
            `maxWeightExceeded`, `maxDimensionExceeded`, `routeNotServedForCod`.
          example: codLimitExceeded

    Rate:
      type: object
      description: One carrier's rate in a shipment's rate list
      properties:
        rateId: { type: integer, format: int64, example: 7001234 }
        carrierToken: { type: string, example: ec_laar }
        priceSubtotal: { type: number, example: 0.88 }
        priceTotal: { type: number, example: 1.01 }
        currency: { type: string, example: USD }
        estimateDays: { type: integer, example: 2 }
        available:
          type: boolean
          description: Whether this rate can be selected for payment.
          example: true
        unavailableReason:
          type: string
          description: >-
            Machine-readable constraint code, present only when `available` is
            false. Known codes (extensible): `codLimitExceeded`,
            `maxWeightExceeded`, `routeNotServedForCod`.
          example: codLimitExceeded

    Territory:
      type: object
      properties:
        territoryBaseId:
          type: string
          description: Canonical opaque id; pass back unchanged on addresses.
          example: 'EC|:|PICHINCHA|:|QUITO|:|QUITO'
        territory1Name: { type: string, description: 'Level 1 division (EC: Provincia).', example: PICHINCHA }
        territory2Name: { type: string, description: 'Level 2 division (EC: Cantón).', example: QUITO }
        territory3Name: { type: string, description: 'Level 3 division (EC: Parroquia).', example: QUITO }
        searchableText: { type: string, description: Human-readable label for typeahead UIs., example: Pichincha - Quito - Quito }

    ApiError:
      type: object
      description: Standard error body.
      required: [statusCode, message]
      properties:
        statusCode: { type: integer, example: 422 }
        message:
          type: string
          description: Machine-readable error code (camelCase).
          example: pApiShipmentPreferredRateRequired

    PageMeta:
      type: object
      description: Pagination metadata shared by paginated list payloads.
      properties:
        count: { type: integer, description: Items on this page (≤ limit)., example: 1 }
        page: { type: integer, description: The page number returned., example: 1 }
        pageCount: { type: integer, description: Total number of pages., example: 1 }
        total: { type: integer, description: Total items across all pages., example: 1 }

    # ── Enums ───────────────────────────────────────────────────────────────
    AddressType:
      type: string
      enum: [sender, recipient]

    GoodsCurrency:
      type: string
      description: ISO 4217 code for declared-goods amounts. Only `USD` is supported in this version.
      enum: [USD]

    PurchaseWith:
      type: string
      description: >-
        Wallet source to pay from — a strict subset of the internal payment
        methods. REQUIRED (no default): choose one explicitly.
      enum: [walletTokenized, walletAvailable]

    ProductCategory:
      type: string
      description: Canonical parcel-content classification.
      enum:
        - agriculturalSupply
        - audioAndVideoAccessory
        - babyProduct
        - beverage
        - book
        - camera
        - cellularPhone
        - clothes
        - clothingAccessory
        - computer
        - decoration
        - documents
        - dron
        - electromenor
        - food
        - householdAppliance
        - jewelryAndWatch
        - kitchenware
        - medicalEquipment
        - medicalSupply
        - musicalInstrument
        - party
        - personalCareProduct
        - petAccessory
        - petFood
        - printer
        - shoeAndFootwear
        - spareparts
        - sportingArticle
        - stationery
        - television
        - toy
        - vehicleAccessory
        - videoGame

    ShipmentStatus:
      type: string
      description: Lifecycle status. `isPaid` distinguishes an unpaid `quoted` draft from a paid one.
      enum:
        - quoted
        - labelCreated
        - pickupRequested
        - pickupNotFound
        - pickingUp
        - pickedUp
        - inTransit
        - goodsCollectionInTransit
        - returnToSender
        - delivered
        - annulled
        - refunded
        - refundPending

    ShipmentAnnulReasonStatus:
      type: string
      enum:
        - incorrectAddress
        - incorrectShipmentDetails
        - fullfilmentIssue
        - recipientRefusedDelivery
        - recipientNotAvailable
        - recipientCanceledOrder
        - platformCost
        - deliveryDelay
        - carrierOutOfCoverageArea
        - carrierOutOfOfficeSchedule
        - other

    # ── Request bodies ──────────────────────────────────────────────────────
    QuotationRequest:
      type: object
      required: [senderAddress, recipientAddress, parcel, goodsCurrency]
      properties:
        senderAddress: { $ref: '#/components/schemas/QuoteAddress' }
        recipientAddress: { $ref: '#/components/schemas/QuoteAddress' }
        parcel: { $ref: '#/components/schemas/Parcel' }
        goodsCollection: { type: number, description: Cash-on-delivery amount to collect; 0 for none., example: 50.0 }
        goodsInsured: { type: number, description: Declared insurance value; 0 for none., example: 50.0 }
        goodsCurrency: { $ref: '#/components/schemas/GoodsCurrency' }

    ShipmentCreateRequest:
      type: object
      description: >-
        Provide the recipient EITHER inline via `recipientAddress` OR as a saved
        `recipientAddressId` — exactly one.
      required: [senderAddressId, parcel, contents, goodsCollection, goodsInsured, goodsCurrency]
      properties:
        senderAddressId:
          type: integer
          format: int64
          description: Id of a saved sender address (`GET /address` / `POST /address`).
          example: 2001234
        recipientAddressId:
          type: integer
          format: int64
          description: Id of a saved recipient address (mutually exclusive with `recipientAddress`).
          example: 2001235
        recipientAddress: { $ref: '#/components/schemas/AddressInline' }
        parcel: { $ref: '#/components/schemas/Parcel' }
        contents:
          type: array
          description: Exactly one product-category value (some carriers require content classification).
          items: { $ref: '#/components/schemas/ProductCategory' }
          minItems: 1
          maxItems: 1
          example: [clothes]
        goodsCollection: { type: number, example: 50.0 }
        goodsInsured: { type: number, example: 50.0 }
        goodsCurrency: { $ref: '#/components/schemas/GoodsCurrency' }
        extId:
          type: string
          description: >-
            Optional merchant-supplied external id (your own order id), echoed back on every shipment
            response. Must be UNIQUE per account — re-using an extId already accepted for this account is
            rejected with 409 pApiShipmentExtIdAlreadyUsed; the create is never replayed and nothing is
            overwritten.
          example: my-shop-order-9876

    ShipmentPurchaseRequest:
      type: object
      required: [purchaseWith]
      properties:
        preferredRateObjectId:
          type: integer
          format: int64
          description: The chosen rate's `rateId` from the create response's `rates[]`.
          example: 7001234
        purchaseWith: { $ref: '#/components/schemas/PurchaseWith' }

    ShipmentEditRequest:
      type: object
      description: >-
        Partial edit of an UNPAID `quoted` draft. EVERY field is optional and
        ONLY the fields you send are changed — omitted fields are left untouched.
        After persisting the edits the draft is ALWAYS re-quoted: the prior
        `rates[]` are discarded, any selected rate is cleared, `status` stays
        `quoted`, and a fresh `rates[]` list is returned.

        Provide the recipient EITHER as a saved `recipientAddressId` OR inline via
        `recipientAddress` — never both. Address edits never mutate a saved/template
        address; they re-point this draft to a fresh owned address copy.
      properties:
        senderAddressId:
          type: integer
          format: int64
          description: Id of a saved sender address to re-point this draft to.
          example: 2001234
        recipientAddressId:
          type: integer
          format: int64
          description: Id of a saved recipient address (mutually exclusive with `recipientAddress`).
          example: 2001235
        recipientAddress: { $ref: '#/components/schemas/AddressInline' }
        parcel: { $ref: '#/components/schemas/Parcel' }
        contents:
          type: array
          items: { $ref: '#/components/schemas/ProductCategory' }
          minItems: 1
          maxItems: 1
          example: [clothes]
        goodsCollection: { type: number, description: Cash-on-delivery amount to collect; 0 for none., example: 75.0 }
        goodsInsured: { type: number, description: Declared insurance value; 0 for none., example: 75.0 }
        goodsCurrency: { $ref: '#/components/schemas/GoodsCurrency' }

    ShipmentAnnulRequest:
      type: object
      required: [annulReasonStatus]
      properties:
        annulReasonStatus: { $ref: '#/components/schemas/ShipmentAnnulReasonStatus' }
        annulReasonDetails: { type: string, description: Optional free-text note., example: Customer changed their mind }

    AddressCreateRequest:
      type: object
      required: [fullName, territoryBaseId, country, streetLine1, phone, addressType]
      properties:
        fullName: { type: string, example: María García }
        company: { type: string, example: Acme S.A. }
        territoryBaseId: { type: string, example: 'EC|:|PICHINCHA|:|QUITO|:|QUITO' }
        country: { type: string, example: EC }
        streetLine1: { type: string, example: Av. Amazonas N24-03 y Colón }
        reference: { type: string, example: Frente al parque }
        zip: { type: string, description: Optional postal code., example: '170135' }
        email: { type: string, format: email, example: maria.garcia@example.com }
        phone: { type: string, description: E.164., example: '+593987654321' }
        lat: { type: number, example: -0.1807 }
        lng: { type: number, example: -78.4678 }
        addressType: { $ref: '#/components/schemas/AddressType' }

    # ── Resource payloads ───────────────────────────────────────────────────
    ShipmentDraft:
      type: object
      description: A freshly-created unpaid shipment draft with its rate list
      properties:
        shipmentId: { type: integer, format: int64, example: 4001234 }
        extId:
          type: string
          nullable: true
          description: Merchant-supplied external id echoed back (`null` when none was supplied on create); unique per account (re-use rejected on create with 409 pApiShipmentExtIdAlreadyUsed).
          example: my-shop-order-9876
        status: { $ref: '#/components/schemas/ShipmentStatus' }
        isPaid: { type: boolean, example: false }
        goodsCollection: { type: number, example: 50.0 }
        goodsInsured: { type: number, example: 50.0 }
        contents:
          type: array
          items: { $ref: '#/components/schemas/ProductCategory' }
          example: [clothes]
        senderAddress:
          allOf: [{ $ref: '#/components/schemas/Address' }]
          description: The full sender address embedded — no second call needed. Its id is `senderAddress.addressId`.
        recipientAddress:
          allOf: [{ $ref: '#/components/schemas/Address' }]
          description: The full recipient address embedded — no second call needed. Its id is `recipientAddress.addressId`.
        objectCreated: { type: string, format: date-time, example: '2026-05-09T14:32:00.000Z' }
        objectUpdated: { type: string, format: date-time, example: '2026-05-09T14:32:00.000Z' }
        goodsCurrency: { type: string, example: USD }
        trackingNumber: { type: [string, 'null'], example: null }
        trackingCarrierUrl: { type: [string, 'null'], example: null }
        incidentCount: { type: [integer, 'null'], example: null }
        rates:
          type: array
          description: rate list
          items: { $ref: '#/components/schemas/Rate' }

    ShipmentDetail:
      type: object
      description: |
        A shipment's current state — the single response shape for `GET /shipment/{id}`, `GET /shipment` (list items), and the act endpoints (`purchase`, `generateTrackingNumber`, `annulAndRefund`). Each address is surfaced as the FULL embedded object (`senderAddress` / `recipientAddress`, with the id at `senderAddress.addressId`) — the complete address travels in every shipment response, so there is no second call to make (there is no `GET /address/{id}` endpoint). `goodsCurrency` is the shipment's own currency (always present). Rate-derived (`preferredCarrierToken`/`priceSubtotal`/`priceTotal`) and `trackingNumber`/`trackingCarrierUrl` fields are `null` until the shipment has its tracking number created. To download the label PDF, mint a link with `POST /shipment/generateLabelUrl/{id}`.
      properties:
        shipmentId: { type: integer, format: int64, example: 4001234 }
        extId:
          type: string
          nullable: true
          description: Merchant-supplied external id echoed back (`null` when none was supplied on create); unique per account (re-use rejected on create with 409 pApiShipmentExtIdAlreadyUsed).
          example: my-shop-order-9876
        status: { $ref: '#/components/schemas/ShipmentStatus' }
        isPaid: { type: boolean, example: true }
        preferredCarrierToken: { type: [string, 'null'], example: ec_laar }
        priceSubtotal: { type: [number, 'null'], example: 0.88 }
        priceTotal: { type: [number, 'null'], example: 1.01 }
        goodsCurrency: { type: string, example: USD }
        goodsCollection: { type: number, example: 50.0 }
        goodsInsured: { type: number, example: 50.0 }
        contents:
          type: array
          items: { $ref: '#/components/schemas/ProductCategory' }
          example: [clothes]
        senderAddress:
          allOf: [{ $ref: '#/components/schemas/Address' }]
          description: The full sender address embedded — no second call needed. Its id is `senderAddress.addressId`.
        recipientAddress:
          allOf: [{ $ref: '#/components/schemas/Address' }]
          description: The full recipient address embedded — no second call needed. Its id is `recipientAddress.addressId`.
        trackingNumber: { type: [string, 'null'], example: LAAR-EC-987654321 }
        trackingCarrierUrl: { type: [string, 'null'], example: 'https://carrier.example.com/tracking/LAAR-EC-987654321' }
        incidentCount:
          type: integer
          nullable: true
          example: 0
          description: >-
            Number of open delivery incidents recorded for this shipment. `null` means no incidents have been
            registered. When a shipment is **in transit** (`status: "inTransit"`) and `incidentCount` is greater
            than `0`, treat it as an alert requiring manual attention — the delivery has a problem that cannot
            be resolved automatically. Recommended actions: contact Sendifico customer support, or reach out
            directly to the carrier using the `trackingNumber` to investigate and resolve the issue.
        objectCreated: { type: string, format: date-time, example: '2026-05-09T14:32:00.000Z' }
        objectUpdated: { type: string, format: date-time, example: '2026-05-09T16:10:00.000Z' }

    ShipmentGenerateLabelUrlRequest:
      type: object
      description: >-
        Request body for `POST /shipment/generateLabelUrl/{id}` — select which label to mint a download URL for, and how the browser should handle it.
      required: [type]
      properties:
        type:
          type: string
          enum: [carrierDefault]
          description: Which label to mint a URL for. Currently only `carrierDefault` (the carrier's default-size PDF); the set is forward-compatible.
          example: carrierDefault
        disposition:
          type: string
          enum: [inline, attachment]
          default: inline
          description: >-
            Content-Disposition of the minted URL: `inline` (default — preview in the browser) or
            `attachment` (force "Save as"). Any other value → `400 pApiShipmentLabelDispositionInvalid`.
          example: inline

    LabelDownload:
      type: object
      description: >-
        A freshly minted, time-limited download URL for a shipment label — the response of
        `POST /shipment/generateLabelUrl/{id}`.
      properties:
        type:
          type: string
          enum: [carrierDefault]
          example: carrierDefault
        downloadUrl:
          type: string
          format: uri
          description: Anonymous, browser-pasteable URL — works without an API key until `expiresAt` (7-day max).
          example: 'https://nbg1.your-objectstorage.com/sendifico-shipping-labels/labels/EC/2026/06/shipment-4001234-carrierDefault.pdf?X-Amz-Expires=604800&X-Amz-Signature=...'
        expiresAt:
          type: string
          format: date-time
          description: Absolute ISO-8601 deadline after which `downloadUrl` stops working (7-day max).
          example: '2026-07-02T18:25:00.000Z'

    # ── Response envelopes ──────────────────────────────────────────────────
    QuotationListEnvelope:
      type: object
      properties:
        payload:
          allOf:
            - $ref: '#/components/schemas/PageMeta'
            - type: object
              properties:
                data:
                  type: array
                  items: { $ref: '#/components/schemas/QuotationRate' }
        objectType: { type: string, const: quotation }

    ShipmentDraftEnvelope:
      type: object
      properties:
        payload: { $ref: '#/components/schemas/ShipmentDraft' }
        objectType: { type: string, const: shipment }

    ShipmentDetailEnvelope:
      type: object
      properties:
        payload: { $ref: '#/components/schemas/ShipmentDetail' }
        objectType: { type: string, const: shipment }

    LabelDownloadEnvelope:
      type: object
      properties:
        payload: { $ref: '#/components/schemas/LabelDownload' }
        objectType: { type: string, const: shipmentLabel }

    ShipmentListEnvelope:
      type: object
      properties:
        payload:
          allOf:
            - $ref: '#/components/schemas/PageMeta'
            - type: object
              properties:
                data:
                  type: array
                  items: { $ref: '#/components/schemas/ShipmentDetail' }
        objectType: { type: string, const: shipment }

    AddressEnvelope:
      type: object
      properties:
        payload: { $ref: '#/components/schemas/Address' }
        objectType: { type: string, const: address }

    AddressListEnvelope:
      type: object
      properties:
        payload:
          allOf:
            - $ref: '#/components/schemas/PageMeta'
            - type: object
              properties:
                data:
                  type: array
                  items: { $ref: '#/components/schemas/Address' }
        objectType: { type: string, const: address }

    TerritoryListEnvelope:
      type: object
      properties:
        payload:
          type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Territory' }
        objectType: { type: string, const: territory }
