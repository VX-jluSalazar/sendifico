  /shipment/generateTrackingNumber/{id}:
    patch:
      operationId: generateShipmentTrackingNumber
      tags: [How to create my first shipment]
      summary: Generate the carrier tracking number
      description: |
        Contact the carrier to generate a valid `trackingNumber` for a PAID shipment. No request body. On success the shipment moves to `status: "labelCreated"`. The purpose of this step is to ensure that the carrier has validated and accepted your shipment request.

        **The carrier label PDF is NOT returned here.** This call returns the `trackingNumber` only. To obtain the carrier label PDF, mint a download link separately with `POST /shipment/generateLabelUrl/{id}`.

        **This call can fail if the carrier's API is down** — that is outside Sendifico's control, so your integration MUST verify a `trackingNumber` was actually returned before proceeding.

        **Idempotent:** the tracking number is generated exactly once and is immutable. Repeat calls return the same `trackingNumber` and do NOT re-contact the carrier, so retrying after a network failure is safe. A purchased shipment cannot be edited, so there is nothing to "regenerate".

        **Timing — create this close to dispatch.** Ideally call it on the **same day** (or day before) the shipment is handed to the carrier (pickup or drop-off at a branch). Some carriers (e.g. **Tramaco**) **auto-annul a tracking number after ~1-3 days of inactivity** — if that happens you must create a new one. Do not create tracking numbers far in advance of actual dispatch.
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - $ref: '#/components/parameters/CountryHeader'
        - $ref: '#/components/parameters/ShipmentIdPath'
      responses:
        '200':
          description: Tracking number created
          headers:
            x-sendifico-api-version: { $ref: '#/components/headers/ApiVersionEcho' }
            x-sendifico-country: { $ref: '#/components/headers/CountryEcho' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShipmentDetailEnvelope' }
              example:
                payload:
                  shipmentId: 4001234
                  extId: my-shop-order-9876
                  status: labelCreated
                  isPaid: true
                  preferredCarrierToken: ec_laar
                  priceSubtotal: 0.88
                  priceTotal: 1.01
                  goodsCurrency: USD
                  goodsCollection: 50.0
                  goodsInsured: 50.0
                  contents: [clothes]
                  senderAddress:
                    addressId: 2001234
                    addressType: sender
                    fullName: Juan Pérez
                    company: Acme S.A.
                    email: juan.perez@example.com
                    streetLine1: Av. 9 de Octubre 1234
                    reference: Edificio Plaza, oficina 201
                    territoryBaseId: 'EC|:|GUAYAS|:|GUAYAQUIL|:|GUAYAQUIL'
                    country: EC
                    zip: '090313'
                    lat: -2.1894
                    lng: -79.8891
                    phone: '+593987654321'
                    objectCreated: '2026-04-12T09:00:00.000Z'
                  recipientAddress:
                    addressId: 2001235
                    addressType: recipient
                    fullName: María García
                    company: null
                    email: maria.garcia@example.com
                    streetLine1: Av. Amazonas N34-451
                    reference: Frente al parque
                    territoryBaseId: 'EC|:|PICHINCHA|:|QUITO|:|QUITO'
                    country: EC
                    zip: '170135'
                    lat: -0.1807
                    lng: -78.4678
                    phone: '+593998877665'
                    objectCreated: '2026-04-12T09:05:00.000Z'
                  trackingNumber: LAAR-EC-987654321
                  trackingCarrierUrl: 'https://tracking.sendifico.com/LAAR-EC-987654321'
                  incidentCount: null
                  objectCreated: '2026-05-09T14:32:00.000Z'
                  objectUpdated: '2026-05-09T16:10:00.000Z'
                objectType: shipment
        '400':
          $ref: '#/components/responses/RequestValidationError'
        '401':
