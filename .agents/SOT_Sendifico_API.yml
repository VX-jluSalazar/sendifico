  /shipment/purchase/{id}:
    patch:
      operationId: purchaseShipment
      tags: [How to create my first shipment]
      summary: Pick a rate and pay
      description: |
        Pick a rate and pay for a previously-created unpaid shipment from your wallet. The `{id}` is the `shipmentId` from `POST /shipment`.

        - `preferredRateObjectId` — the chosen rate's `rateId` from the create response's `rates[]`. This is how the carrier is selected. Required before payment: if omitted AND no rate is selected yet → `422 pApiShipmentPreferredRateRequired`.
        - `purchaseWith` — **required**; `walletTokenized` or `walletAvailable` (no default). Omitted → `400 pApiShipmentPurchaseWithRequired`; any other value → `400 pApiWalletUnsupportedPaymentMethod`.

        Insufficient balance → `422 paymentIntentExecuteTransactionWalletInsufficientFunds` (no charge). Re-paying a paid shipment → `422 paymentIntentShipmentPurchaseTransactionAlreadyCreated`.

        A successful response must show field `isPaid: true`, which means your wallet has been successfully charged for the shipment.

        Next: `PATCH /shipment/generateTrackingNumber/{id}` to contact the carrier and generate the tracking number.
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - $ref: '#/components/parameters/CountryHeader'
        - $ref: '#/components/parameters/ShipmentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ShipmentPurchaseRequest' }
            example:
              preferredRateObjectId: 7001234
              purchaseWith: walletTokenized
      responses:
        '200':
          description: Shipment paid; carrier selected
          headers:
            x-sendifico-api-version: { $ref: '#/components/headers/ApiVersionEcho' }
            x-sendifico-country: { $ref: '#/components/headers/CountryEcho' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShipmentDetailEnvelope' }
              example:
                payload:
                  shipmentId: 4001234
                  extId: my-shop-order-9876
                  status: quoted
                  isPaid: true
                  preferredCarrierToken: ec_laar
                  priceSubtotal: 0.88
                  priceTotal: 1.01
                  goodsCurrency: USD
                  goodsCollection: 50.0
                  goodsInsured: 50.0
                  contents: [clothes]
                  senderAddress:
                    addressId: 2001234
                    addressType: sender
