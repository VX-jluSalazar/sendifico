    patch:
      operationId: editShipment
      tags: [Shipments]
      summary: Edit an unpaid quoted draft and re-quote
      description: |
        Edit a previously-created shipment that has NOT been paid yet, then get a fresh `rates[]` list. Use this to correct the parcel, contents, addresses, COD amount, or insured value before you pick a rate and pay.

        Editable **only** while the draft is unpaid and still `quoted` (`isPaid: false` AND `status: "quoted"`).

        Send **only** the fields you want to change — every field is optional and omitted fields are left untouched. Provide the recipient EITHER as a saved `recipientAddressId` OR inline via `recipientAddress`, never both. Address edits never mutate a saved/template address: the draft is re-pointed to a fresh owned copy.

        This call **always re-quotes**: the prior `rates[]` are discarded, any previously selected rate is cleared, `status` stays `quoted`, and the response carries a brand-new `rates[]` list (same shape as `POST /shipment`).

        Next: pick a `rateId` where `available` is `true` and pay via `PATCH /shipment/purchase/{id}`.
      parameters:
