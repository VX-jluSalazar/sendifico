openapi: 3.1.0
info:
  title: Sendifico API
  version: '2026-01-01'
  summary: Shipping for e-commerce — quote, create, pay, label, track.
  description: |
    The Sendifico API lets you quote, create, and track shipment labels across a carrier network. Visit <https://app.sendifico.com/integrations> to create your API key.

    ## Interactive docs & spec URL

    - **Hosted reference:** browse this contract interactively, with a built-in "Try it" console, at <https://developers.sendifico.com>.
    - **Machine-readable spec:** this document is published, at <https://api.sendifico.com/api/public/openapi.yaml> — point any OpenAPI viewer, SDK generator, or Postman "import by URL" at it, or ask your AI agent to read it (OpenAI ChatGPT, Anthropic Claude, Google Gemini).

    ## Authentication

    Every request requires **three headers**:

    | Header | Purpose |
    |---|---|
    | `x-api-key` | Your API key. Create one in the Sendifico web app under **Integrations → New Integration → Create Key**. Treat it like a payment credential — it can create and pay for shipments from your wallet, so store it in a secure environment. |
    | `x-sendifico-api-version` | The date-stamped API version your integration targets (e.g. `2026-01-01`). Required on every request. |
    | `x-sendifico-country` | The market (ISO 3166-1 alpha-2) the request targets, e.g. `EC`, `US`, `MX`, `CO`. Required on every request; echoed back on the response. |

    ## Versioning

    Header-based, date-stamped (`YYYY-MM-DD`), required on every request. The latest version is `2026-01-01`.

    - Missing `x-sendifico-api-version` → `400 missingApiVersion`; malformed (not `YYYY-MM-DD`) → `400 invalidApiVersion`; unknown date → `400 unknownApiVersion`.
    - To migrate to a future version, change the header value — no key change. Old versions are supported according to the deprecation policy.
    - Every response echoes `x-sendifico-api-version` so you can verify which contract serialized it.
    - **Non-breaking** changes may ship into an existing version without notice: new endpoints, new OPTIONAL request/response fields, bug fixes.

    ## Conventions

    - All endpoints live under `/api/public/<resource>`.
    - **JSON** request/response bodies (`Content-Type: application/json`).
    - **Response envelope.** Every response is wrapped in `{ payload, objectType }`. For single resources `payload` is the resource; for paginated lists it is `{ count, data, page, pageCount, total }`; for the unpaginated territory list it is `{ data }`. `objectType` is the singular resource name.
    - **Pagination.** List endpoints accept `?limit=20&page=1`. `GET /territory` is NOT paginated.
    - **Currency.** Responses carry an explicit `currency` next to each amount; requests send declared-goods amounts with `goodsCurrency`. Only `USD` is supported in this version.
    - **Identifiers** (`shipmentId`, `addressId`, …) are bigints rendered as JSON numbers — treat them as opaque. The exception is `territoryBaseId`, an opaque country-prefixed **string**.
    - **Territories, not city names.** Every address references a standardized `territoryBaseId` from `GET /territory` — free-form city strings are never accepted.
    - **Parcel units.** `weight` is kilograms; `length`/`width`/`height` are centimeters. Units are fixed by the contract, not configurable.
    - **Phones** are E.164 with country code, no spaces/dashes (`+593987654321`).

    ## Shipping flow

    A shipment moves through explicit, single-purpose calls so YOU decide exactly when you want to select a carrier and purchase a shipment:

    1. `POST /quotation` — returns a list of quotes/rates from all carriers, based on a origin-destination route. This step is optional and it does NOT lead to the creation of any shipment object, nor any wallet transaction. Use this only to compare prices before creating an actual shipment.
    2. `POST /shipment` — create a draft shipment and get the `rates` list from all carriers. At this point, no carrier is selected and no wallet transaction is made yet.
    3. `PATCH /shipment/purchase/{id}` — pick a `rate` from your preferred carrier and pay for it from your wallet. Before you can purchase a shipment label, you must top-up your wallet at <https://app.sendifico.com/wallet>.
    4. `PATCH /shipment/generateTrackingNumber/{id}` — contact the carrier systems to generate a shipment and get a valid `trackingNumber`. Idempotent — generated once, repeat calls return the same number. Call it close to dispatch (some carriers auto-annul an idle tracking number after ~1-2 days of inactivity).
    5. `POST /shipment/generateLabelUrl/{id}` — mint a short-lived URL to download the label PDF. The URL expires (7 days max); re-call to get a fresh one.

    Need to cancel? `PATCH /shipment/annulAndRefund/{id}` annuls an unpaid draft and refunds a paid one.
  contact:
    name: Sendifico Support
    url: https://sendifico.com

servers:
  - url: https://api.sendifico.com/api/public
    description: Production

security:
  - apiKey: []

tags:
  - name: How to create my first shipment
    description: >-
      The end-to-end happy path for shipping your first parcel: create a shipment draft + read the rate list → pick a rate and pay → create the carrier
      tracking number → get the label download link. Follow these calls in order.
  - name: Shipments
    description: >-
      Work with shipments you have already created — list them, retrieve one by
      ID (status, tracking, addresses), and cancel + refund.
  - name: Addresses
    description: Manage your address book.
  - name: Territories
    description: Reference data — the standardized territories used on every address.

paths:
  /quotation:
    post:
      operationId: quoteShipment
      tags: [How to create my first shipment]
      summary: Get carrier rates
      description: |
        Quote a shipment across all production carriers. Returns one rate row per carrier; **no shipment is created** and nothing is persisted against your address book.

        Both addresses are INLINE and only `territoryBaseId` + `country` are used — full delivery details are collected later on `POST /shipment`. This is also why `senderAddressId` is not accepted here.

        The carrier's insurance fee (`goodsInsured` is the declared insurance value) and carrier's collection fee (`goodsCollection` is the Cash-on-delivery COD amount) are folded into each rate's `priceTotal`.
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - $ref: '#/components/parameters/CountryHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuotationRequest' }
            example:
              senderAddress: { territoryBaseId: 'EC|:|GUAYAS|:|GUAYAQUIL|:|GUAYAQUIL', country: EC }
              recipientAddress: { territoryBaseId: 'EC|:|PICHINCHA|:|QUITO|:|QUITO', country: EC }
              parcel: { weight: 1.5, length: 30, width: 20, height: 10 }
              goodsCollection: 50.0
              goodsInsured: 50.0
              goodsCurrency: USD
      responses:
        '201':
          description: Rates computed
          headers:
            x-sendifico-api-version: { $ref: '#/components/headers/ApiVersionEcho' }
            x-sendifico-country: { $ref: '#/components/headers/CountryEcho' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuotationListEnvelope' }
              example:
                payload:
                  count: 7
                  data:
                    - { quotationId: 5001234, carrierToken: ec_laar, priceSubtotal: 0.88, priceTotal: 1.01, currency: USD, estimateDays: 2, available: true }
                    - { quotationId: 5001235, carrierToken: ec_tramaco, priceSubtotal: 0.96, priceTotal: 1.10, currency: USD, estimateDays: 2, available: false, unavailableReason: codLimitExceeded }
                    - { quotationId: 5001236, carrierToken: servientrega, priceSubtotal: 1.04, priceTotal: 1.20, currency: USD, estimateDays: 3, available: true }
                    - { quotationId: 5001237, carrierToken: ec_delivereo, priceSubtotal: 1.13, priceTotal: 1.30, currency: USD, estimateDays: 1, available: true }
                    - { quotationId: 5001238, carrierToken: ec_yobel, priceSubtotal: 1.22, priceTotal: 1.40, currency: USD, estimateDays: 3, available: true }
                    - { quotationId: 5001239, carrierToken: ec_urbano, priceSubtotal: 1.30, priceTotal: 1.50, currency: USD, estimateDays: 2, available: true }
                    - { quotationId: 5001240, carrierToken: ec_gintracom, priceSubtotal: 1.30, priceTotal: 1.50, currency: USD, estimateDays: 1, available: true }
                  page: 1
                  pageCount: 1
                  total: 7
                objectType: quotation
        '400':
          $ref: '#/components/responses/RequestValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /shipment:
    post:
      operationId: createShipment
      tags: [How to create my first shipment]
      summary: Create a shipment draft + get the carrier's rate list
      description: |
        Validates the input, persists the shipment as an unpaid draft (`status: "quoted"`, `isPaid: false`), and returns the `rates[]` menu (one per available carrier). This call **never charges the wallet**, **never selects a carrier**.

        `extId` is optional but must be **unique per account** — it is your own order id (from your e-commerce or internal system), echoed back on every shipment response. The purpose of this field is to help you track shipments to your orders in your system, so it's higly suggested to use it. Re-sending an `extId` that was already accepted for this account is rejected with `409 pApiShipmentExtIdAlreadyUsed`: the create is **not** replayed and nothing is overwritten. Use a fresh `extId` per order; if a retry is ambiguous, look the order up with `GET /shipment` before retrying. You can also edit a draft unpaid shipment `PATCH /shipment/{id}` to update it and use an existing `extId`.

        `senderAddressId` is required — it must reference one of your saved sender addresses (`GET /address`). Omitting it → `400 pApiAddressSenderRequired`; an id that is not a saved sender address → `404 pApiAddressSenderNotFound`.

        Provide the recipient EITHER inline (`recipientAddress`) OR as a saved `recipientAddressId` — exactly one.

        `parcel` is required with numeric `weight` > 0 and dimensions `length`/`width`/`height` ≥ 1 (on error → `400 pApiQuotationParcelBadRequest`). `contents` is required and must be a non-empty array of one single product category (on error → `400 pApiShipmentContentsRequired`).

        Next: pick a `rateId` where `available` is `true` and pay via `PATCH /shipment/purchase/{id}`.
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - $ref: '#/components/parameters/CountryHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ShipmentCreateRequest' }
            example:
              extId: my-shop-order-9876
              senderAddressId: 2001234
              recipientAddress:
                fullName: María García
                company: Acme S.A.
                email: maria.garcia@example.com
                streetLine1: Av. Amazonas N24-03 y Colón
                reference: Frente al parque
                territoryBaseId: 'EC|:|PICHINCHA|:|QUITO|:|QUITO'
                country: EC
                zip: '170135'
                lat: -0.1807
                lng: -78.4678
                phone: '+593987654321'
              parcel: { weight: 1.5, length: 30, width: 20, height: 10 }
              contents: [clothes]
              goodsCollection: 50.0
              goodsInsured: 50.0
              goodsCurrency: USD
      responses:
        '201':
          description: Draft created with the rate list
          headers:
            x-sendifico-api-version: { $ref: '#/components/headers/ApiVersionEcho' }
            x-sendifico-country: { $ref: '#/components/headers/CountryEcho' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShipmentDraftEnvelope' }
              example:
                payload:
                  shipmentId: 4001234
                  extId: my-shop-order-9876
                  status: quoted
                  isPaid: false
                  goodsCollection: 50.0
                  goodsInsured: 50.0
                  contents: [clothes]
                  senderAddress:
                    addressId: 2001234
                    addressType: sender
                    fullName: Juan Pérez
                    company: Acme S.A.
                    email: juan.perez@example.com
                    streetLine1: Av. 9 de Octubre 1234
                    reference: Edificio Plaza, oficina 201
                    territoryBaseId: 'EC|:|GUAYAS|:|GUAYAQUIL|:|GUAYAQUIL'
                    country: EC
                    zip: '090313'
                    lat: -2.1894
                    lng: -79.8891
                    phone: '+593987654321'
                    objectCreated: '2026-04-12T09:00:00.000Z'
                  recipientAddress:
                    addressId: 2001235
                    addressType: recipient
                    fullName: María García
                    company: null
                    email: maria.garcia@example.com
                    streetLine1: Av. Amazonas N34-451
                    reference: Frente al parque
                    territoryBaseId: 'EC|:|PICHINCHA|:|QUITO|:|QUITO'
                    country: EC
                    zip: '170135'
                    lat: -0.1807
                    lng: -78.4678
                    phone: '+593998877665'
                    objectCreated: '2026-04-12T09:05:00.000Z'
