              schema: { $ref: '#/components/schemas/ApiError' }
              examples:
                alreadyDone:
                  value: { statusCode: 422, message: shipmentAnnulAlreadyDone }

  /shipment/generateLabelUrl/{id}:
    post:
      operationId: generateShipmentLabelUrl
      tags: [How to create my first shipment]
      summary: Get the label download link
      description: |
        Mint a short-lived presign URL to download the label PDF that was **already created during `generateTrackingNumber`**. The URL expires (7 days max); re-call to get a new one with a new expiry date. Hand the `downloadUrl` to a browser (or forward it to another system) to fetch the PDF directly from storage until `expiresAt`.

        The URL **EXPIRES** — 7 days maximum. **Do NOT store the URL**: store the `shipmentId` and re-call this endpoint to get a fresh one, or download and archive the PDF bytes.

        The minted `downloadUrl` is anonymous — the presign signature is the embedded credential, so it works without your API key until it expires. **Minting** it, however, requires `x-api-key`.

        Send `type` (currently only `carrierDefault`, in the future we will support more printing sizes); an unknown type → `404 pApiShipmentLabelTypeNotFound`. Optional `disposition` controls how the browser handles the link: `inline` (default — preview opens in the browser) or `attachment` (force "Save as" best suited to download the file); any other value → `400 pApiShipmentLabelDispositionInvalid`.
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - $ref: '#/components/parameters/CountryHeader'
        - $ref: '#/components/parameters/ShipmentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ShipmentGenerateLabelUrlRequest' }
            example:
              type: carrierDefault
              disposition: inline
      responses:
        '200':
          description: A freshly minted download URL
          headers:
            x-sendifico-api-version: { $ref: '#/components/headers/ApiVersionEcho' }
            x-sendifico-country: { $ref: '#/components/headers/CountryEcho' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LabelDownloadEnvelope' }
              example:
                payload:
                  type: carrierDefault
                  downloadUrl: 'https://nbg1.your-objectstorage.com/sendifico-shipping-labels/labels/EC/2026/06/shipment-4001234-carrierDefault.pdf?X-Amz-Expires=604800&X-Amz-Signature=...'
                  expiresAt: '2026-07-02T18:25:00.000Z'
                objectType: shipmentLabel
        '400':
          $ref: '#/components/responses/RequestValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/LabelNotReady'

  /address:
    post:
      operationId: createAddress
      tags: [Addresses]
      summary: Create a saved address
      description: |
        Create a saved `sender` or `recipient` address. The returned `addressId` is what you pass as `senderAddressId` / `recipientAddressId` on `POST /shipment`. `country` is required even though it is also encoded in the `territoryBaseId` prefix. Fields `fullName`, `territoryBaseId`, `streetLine1`, `phone`, `country` are required; all other fields are optional. It's highly suggested to set the `email` as we deliver tracking updates to the recipient's email automatically. We recommend to use coordinates (lat / lng) to ensure accurate delivery.
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - $ref: '#/components/parameters/CountryHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddressCreateRequest' }
            example:
              fullName: María García
              company: Acme S.A.
              territoryBaseId: 'EC|:|PICHINCHA|:|QUITO|:|QUITO'
              country: EC
              streetLine1: Av. Amazonas N24-03 y Colón
              reference: Frente al parque
              zip: '170135'
              email: maria.garcia@example.com
              phone: '+593987654321'
              lat: -0.1807
              lng: -78.4678
              addressType: sender
      responses:
        '201':
          description: Address saved
          headers:
            x-sendifico-api-version: { $ref: '#/components/headers/ApiVersionEcho' }
            x-sendifico-country: { $ref: '#/components/headers/CountryEcho' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AddressEnvelope' }
              example:
                payload:
                  addressId: 2001234
                  fullName: María García
                  company: Acme S.A.
                  territoryBaseId: 'EC|:|PICHINCHA|:|QUITO|:|QUITO'
                  country: EC
                  streetLine1: Av. Amazonas N24-03 y Colón
                  reference: Frente al parque
                  zip: '170135'
                  email: maria.garcia@example.com
                  phone: '+593987654321'
